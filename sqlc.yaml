version: "2"
sql:
  - schema: "internal/infra/repository/postgres/sqlc/migrations"
    queries: "internal/infra/repository/postgres/sqlc/queries"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/infra/repository/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
        emit_pointers_for_null_types: true
